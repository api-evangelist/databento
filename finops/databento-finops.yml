description: >-
  FinOps view of Databento spend. Databento bills on a usage basis - per
  uncompressed binary byte streamed for historical and live data, at a per-GB
  rate that varies by dataset and schema - with optional monthly subscriptions
  (Standard, Plus, Unlimited) that bundle live access, history depth, and
  distribution rights. New accounts get US$125 in free credit toward historical
  data. Because billing is per byte, the dominant cost drivers are the schemas
  chosen (full order book MBO is far larger than trades or OHLCV), the symbol
  count, and the date range. Databento exposes cost-estimation endpoints so
  spend can be predicted before a query runs.
notes: >-
  Per-GB rates are dataset- and schema-specific and are not reconciled here;
  verify on the pricing page. The single most effective cost lever is schema
  selection - request the coarsest schema that answers the question (OHLCV or
  trades instead of MBO) and the narrowest symbol set and date range.
