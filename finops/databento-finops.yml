meters:
- name: data_streamed
  description: Uncompressed binary bytes streamed for historical and live data, billed per GB at a dataset- and schema-specific rate.
  unit: bytes
  aggregation: sum
  dimensions:
  - account
  - dataset
  - schema
- name: batch_download
  description: Batch jobs materialized into flat files; charged once, re-downloadable for 30 days.
  unit: bytes
  aggregation: sum
  dimensions:
  - account
  - dataset
  - schema
- name: subscription_fee
  description: Flat monthly subscription fee for Standard, Plus, or Unlimited plans.
  unit: usd
  aggregation: sum
  dimensions:
  - account
  - plan
- name: free_credit
  description: US$125 new-user credit applied against historical usage; expires after 6 months.
  unit: usd
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Attribute streamed-byte and batch spend per dataset and schema; use metadata.get_cost to forecast a query before running it.
- name: Allocation
  description: Tag usage by account, dataset, and schema so market-data spend maps to research teams, strategies, or products.
- name: Optimization
  description: Choose the coarsest schema that answers the question (OHLCV or trades over full-book MBO), narrow symbols and date ranges, and reuse 30-day batch re-downloads instead of re-streaming; pick a subscription tier when steady live/history use exceeds pay-as-you-go.
- name: Accountability
  description: Review monthly streamed-GB and subscription charges against the free credit and budget; set expectations before large historical pulls.
