  description: Streams historical market data over HTTP for a requested date/time
    range. A single request selects a dataset, one or more symbols, a schema (MBO
    full order book, MBP-1/MBP-10, trades, OHLCV bars, statistics, and more), and a
    time range, and returns normalized records in DBN, CSV, or JSON. Billed per byte
    streamed. Ideal for backtesting, research, and reference/tick data retrieval.
