  description: Submits asynchronous batch jobs that materialize large historical
    requests into downloadable flat files (DBN, CSV, or JSON), optionally split by
    day, symbol, or size. Submit a job, list your jobs and their state, and list the
    generated files with HTTPS and FTP download URIs. Files remain re-downloadable
    for 30 days at no extra cost.
- aid: databento:databento-live-streaming-api
  name: Databento Live Streaming API
  tags:
  - Live Market Data
  - Streaming
  - Market Data
  - Trading
  - Low Latency
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://databento.com/docs/api-reference-live
  baseURL: tcp://GLBX.MDP3.lsg.databento.com
  properties:
  - url: https://databento.com/docs/api-reference-live
    type: Documentation
  - url: https://databento.com/docs/api-reference-live/basics/authentication
    type: Authentication
  - url: https://databento.com/docs/standards-and-conventions/databento-binary-encoding
    type: Documentation
  description: Low-latency live market data delivered over a raw TCP binary streaming
    protocol using Databento Binary Encoding (DBN) - the same normalized schemas as
    the historical API. Sessions authenticate with a CRAM challenge-response
    handshake using your API key, then subscribe to symbols and schemas per dataset
    gateway. This is a binary TCP protocol, not a documented public WebSocket; it is
    consumed via the official Python, C++, and Rust clients and has no OpenAPI
    description.
