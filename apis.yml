aid: databento
url: https://raw.githubusercontent.com/api-evangelist/databento/refs/heads/main/apis.yml
name: Databento
kind: company
description: Databento is a market data platform that delivers historical and live
  financial market data through a single, normalized API. It covers equities, futures,
  options, and other asset classes across major venues, with full order book depth
  (MBO/MBP), trades, OHLCV bars, and reference data. Historical data is served over
  a REST HTTP API (hist.databento.com) with pay-as-you-go billing per byte streamed,
  while live data is delivered over a low-latency raw TCP binary protocol using
  Databento Binary Encoding (DBN). Official Python, C++, and Rust client libraries
  wrap both surfaces, and a Reference API provides security master, corporate
  actions, and adjustment factor data.
